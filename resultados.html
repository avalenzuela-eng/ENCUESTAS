<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Resultados · Casa Santiago</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#FBF9F4; --card:#FFFFFF; --jade:#1D4B42; --jade-soft:#2C6156;
    --brass:#B0894C; --ink:#2A2925; --muted:#7C766A; --line:#E7E1D5;
    --bien:#2F7D5B; --bien-bg:#E7F1EA; --reg:#C0912A; --reg-bg:#FBF1D9;
    --mal:#BC4A32; --mal-bg:#FBE6E0;
    --shadow:0 1px 2px rgba(42,41,37,.06),0 8px 24px rgba(42,41,37,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overflow-x:hidden;-webkit-text-size-adjust:100%;}
  body{background:var(--bone);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
    font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:40px;}
  .wrap{max-width:640px;margin:0 auto;width:100%;padding:0 16px;}
  .serif{font-family:'Fraunces',serif;font-weight:500;}
  .tiles{height:10px;background:repeating-linear-gradient(135deg,var(--jade) 0 10px,var(--brass) 10px 20px);opacity:.9;}

  /* Header */
  header.hero{background:var(--jade);color:#F3EFE6;padding:calc(22px + env(safe-area-inset-top)) 16px 20px;}
  header.hero .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#C8B48A;font-weight:600;margin:0 0 6px;}
  header.hero h1{font-family:'Fraunces',serif;font-weight:500;font-size:28px;line-height:1.05;margin:0;letter-spacing:-.01em;}

  /* Login */
  .login-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow);margin-top:26px;}
  .login-card h2{font-family:'Fraunces',serif;font-weight:500;font-size:19px;margin:0 0 4px;}
  .login-card p.hint{font-size:13px;color:var(--muted);margin:0 0 18px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 6px;}
  input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px;font-family:inherit;font-size:16px;color:var(--ink);background:var(--bone);margin-bottom:14px;}
  input:focus{outline:2px solid var(--jade-soft);outline-offset:0;border-color:var(--jade-soft);}
  .btn{border:none;border-radius:12px;padding:14px 16px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:transform .1s ease,opacity .15s;width:100%;}
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.6;cursor:default;}
  .btn-primary{background:var(--jade);color:#F3EFE6;}
  .btn-ghost{background:var(--card);border:1px solid var(--line);color:var(--ink);}
  .err{display:none;font-size:12.5px;color:var(--mal);background:var(--mal-bg);border:1px solid var(--mal);border-radius:9px;padding:9px 11px;white-space:pre-wrap;word-break:break-word;line-height:1.4;margin-top:6px;}

  /* Toolbar */
  .toolbar{display:flex;align-items:center;gap:10px;margin:20px 0 8px;flex-wrap:wrap;}
  .toolbar .count{font-family:'Fraunces',serif;font-size:19px;font-weight:500;flex:1;min-width:140px;}
  .toolbar .count small{font-family:'Inter',sans-serif;font-size:12.5px;color:var(--muted);font-weight:500;display:block;margin-top:1px;}
  .btn-sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px;}

  /* Stats */
  .stats{display:flex;gap:8px;margin:6px 0 14px;flex-wrap:wrap;}
  .stat{flex:1;min-width:90px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;box-shadow:var(--shadow);}
  .stat .n{font-family:'Fraunces',serif;font-size:22px;font-weight:600;line-height:1;}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:5px;}

  /* Response cards */
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;}
  .rc-head{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;user-select:none;}
  .rc-main{flex:1;min-width:0;}
  .rc-name{font-family:'Fraunces',serif;font-weight:500;font-size:16.5px;}
  .rc-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .rc-rating{font-size:12px;font-weight:700;border-radius:99px;padding:4px 10px;background:var(--jade);color:#F3EFE6;white-space:nowrap;font-variant-numeric:tabular-nums;}
  .rc-rating.none{background:var(--line);color:var(--muted);}
  .chev{width:18px;height:18px;flex-shrink:0;color:var(--muted);transition:transform .25s ease;}
  .rcard.open .chev{transform:rotate(180deg);}
  .rc-tags{display:flex;gap:6px;padding:0 16px 14px;flex-wrap:wrap;}
  .tag{font-size:11.5px;font-weight:600;border-radius:99px;padding:3px 9px;background:var(--bone);border:1px solid var(--line);color:var(--muted);}
  .tag.bien{background:var(--bien-bg);border-color:var(--bien);color:var(--bien);}
  .tag.reg{background:var(--reg-bg);border-color:var(--reg);color:var(--reg);}
  .tag.mal{background:var(--mal-bg);border-color:var(--mal);color:var(--mal);}
  .rc-body{display:none;border-top:1px solid var(--line);padding:14px 16px;}
  .rcard.open .rc-body{display:block;}
  .rc-body pre{white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12.5px;line-height:1.5;color:var(--ink);background:var(--bone);border:1px solid var(--line);border-radius:10px;padding:12px;margin:0;}

  .empty,.loading{text-align:center;color:var(--muted);font-size:14px;padding:40px 16px;}
  .footnote{text-align:center;font-size:11.5px;color:var(--muted);padding:22px 16px 6px;}
  [hidden]{display:none !important;}
</style>
</head>
<body>
<div class="tiles"></div>
<header class="hero">
  <p class="eyebrow">Lohr Collection · Panel privado</p>
  <h1>Resultados · Casa Santiago</h1>
</header>

<div class="wrap">

  <!-- LOGIN -->
  <div id="login">
    <div class="login-card">
      <h2>Acceso privado</h2>
      <p class="hint">Ingresa con tu correo y contraseña para ver las respuestas.</p>
      <form id="loginForm">
        <label>Correo</label>
        <input id="email" type="email" autocomplete="username" placeholder="tucorreo@ejemplo.com" required>
        <label>Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
        <button class="btn btn-primary" id="loginBtn" type="submit">Entrar</button>
        <div class="err" id="loginErr"></div>
      </form>
    </div>
  </div>

  <!-- APP -->
  <div id="app" hidden>
    <div class="toolbar">
      <div class="count"><span id="countN">—</span> respuestas<small id="countSub"></small></div>
      <button class="btn btn-ghost btn-sm" id="refreshBtn">Actualizar</button>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Salir</button>
    </div>
    <div class="stats" id="stats"></div>
    <div id="list"></div>
    <p class="footnote">Panel privado · las respuestas se guardan en Supabase.</p>
  </div>

</div>

<script>
(function(){
  "use strict";

  const SUPABASE_URL = "https://lihudwczbdbvauumnuag.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpaHVkd2N6YmRidmF1dW1udWFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDAzODYsImV4cCI6MjA5OTI3NjM4Nn0.FUd0HAe-nH7jJezJr1MIIslh1qps9WM5CAdSBlJaeqI";
  const TOKEN_KEY = "casa_santiago_token";

  const $ = s => document.querySelector(s);
  const loginView = $("#login");
  const appView = $("#app");

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }

  // ---------- Auth ----------
  async function login(email, password){
    const r = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
      method:"POST",
      headers:{ "apikey":SUPABASE_ANON_KEY, "Content-Type":"application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json().catch(()=>({}));
    if(!r.ok){ throw new Error(data.error_description || data.msg || data.message || ("HTTP "+r.status)); }
    return data.access_token;
  }

  async function fetchRespuestas(token){
    const r = await fetch(SUPABASE_URL + "/rest/v1/respuestas?select=*&order=creado_en.desc", {
      headers:{ "apikey":SUPABASE_ANON_KEY, "Authorization":"Bearer "+token }
    });
    if(r.status === 401){ const e = new Error("401"); e.unauthorized = true; throw e; }
    const data = await r.json().catch(()=>[]);
    if(!r.ok){ throw new Error((data && data.message) || ("HTTP "+r.status)); }
    return Array.isArray(data) ? data : [];
  }

  // ---------- Render ----------
  function fmtDate(iso){
    if(!iso) return "";
    try{ return new Date(iso).toLocaleString("es-MX",{ day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" }); }
    catch(e){ return iso; }
  }

  function renderStats(rows){
    const total = rows.length;
    const rated = rows.filter(r=> r.rating);
    const avg = rated.length ? (rated.reduce((a,r)=>a+r.rating,0)/rated.length).toFixed(1) : "—";
    const bien = rows.reduce((a,r)=>a+(r.avance_bien||0),0);
    const mal  = rows.reduce((a,r)=>a+(r.avance_mal||0),0);
    $("#stats").innerHTML =
      '<div class="stat"><div class="n">'+total+'</div><div class="l">Respuestas</div></div>'+
      '<div class="stat"><div class="n">'+avg+'</div><div class="l">Calif. prom.</div></div>'+
      '<div class="stat"><div class="n" style="color:var(--bien)">'+bien+'</div><div class="l">Puntos bien</div></div>'+
      '<div class="stat"><div class="n" style="color:var(--mal)">'+mal+'</div><div class="l">Puntos mal</div></div>';
  }

  function renderList(rows){
    $("#countN").textContent = rows.length;
    $("#countSub").textContent = rows.length ? ("Última: "+fmtDate(rows[0].creado_en)) : "";
    renderStats(rows);
    const list = $("#list");
    if(!rows.length){
      list.innerHTML = '<div class="empty">Aún no hay respuestas.<br>Cuando alguien envíe la encuesta, aparecerá aquí.</div>';
      return;
    }
    list.innerHTML = "";
    rows.forEach(r=>{
      const card = document.createElement("div");
      card.className = "rcard";
      const nombre = r.evaluador ? esc(r.evaluador) : "Sin nombre";
      const sub = [ r.personas ? (r.personas+" pers.") : "", r.recomienda ? esc(r.recomienda) : "", fmtDate(r.creado_en) ].filter(Boolean).join(" · ");
      const ratingHtml = r.rating ? '<div class="rc-rating">'+r.rating+'/10</div>' : '<div class="rc-rating none">s/c</div>';
      const tags =
        '<span class="tag bien">✅ '+(r.avance_bien||0)+'</span>'+
        '<span class="tag reg">⚠️ '+(r.avance_reg||0)+'</span>'+
        '<span class="tag mal">❌ '+(r.avance_mal||0)+'</span>'+
        (r.avance_total ? '<span class="tag">'+((r.avance_bien||0)+(r.avance_reg||0)+(r.avance_mal||0))+'/'+r.avance_total+'</span>' : '');
      card.innerHTML =
        '<div class="rc-head">'+
          '<div class="rc-main"><div class="rc-name">'+nombre+'</div><div class="rc-sub">'+esc(sub)+'</div></div>'+
          ratingHtml+
          '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>'+
        '</div>'+
        '<div class="rc-tags">'+tags+'</div>'+
        '<div class="rc-body"><pre>'+esc(r.resumen || "(sin resumen)")+'</pre></div>';
      card.querySelector(".rc-head").addEventListener("click", ()=> card.classList.toggle("open"));
      list.appendChild(card);
    });
  }

  // ---------- Flujo ----------
  function showApp(){ loginView.hidden = true; appView.hidden = false; }
  function showLogin(){ appView.hidden = true; loginView.hidden = false; }

  async function cargar(){
    const token = sessionStorage.getItem(TOKEN_KEY);
    if(!token){ showLogin(); return; }
    $("#list").innerHTML = '<div class="loading">Cargando respuestas…</div>';
    showApp();
    try{
      const rows = await fetchRespuestas(token);
      renderList(rows);
    }catch(e){
      if(e.unauthorized){ sessionStorage.removeItem(TOKEN_KEY); showLogin(); return; }
      $("#list").innerHTML = '<div class="empty">No se pudieron cargar las respuestas.<br><small>'+esc(e.message||e)+'</small></div>';
    }
  }

  $("#loginForm").addEventListener("submit", async (ev)=>{
    ev.preventDefault();
    const btn = $("#loginBtn"), errBox = $("#loginErr");
    errBox.style.display = "none";
    btn.disabled = true; const t = btn.textContent; btn.textContent = "Entrando…";
    try{
      const token = await login($("#email").value.trim(), $("#password").value);
      if(!token) throw new Error("No se recibió sesión.");
      sessionStorage.setItem(TOKEN_KEY, token);
      cargar();
    }catch(e){
      errBox.textContent = "⚠️ "+(e.message||e);
      errBox.style.display = "block";
    }finally{
      btn.disabled = false; btn.textContent = t;
    }
  });

  $("#refreshBtn").addEventListener("click", cargar);
  $("#logoutBtn").addEventListener("click", ()=>{ sessionStorage.removeItem(TOKEN_KEY); showLogin(); });

  // Al abrir: si ya hay sesión en esta pestaña, cargar directo
  cargar();
})();
</script>
</body>
</html>
